<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protected Page</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
}

.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  padding:40px;
  border-radius:15px;
  text-align:center;
  color:white;
  width:350px;
}

input{
  width:100%;
  padding:12px;
  margin-top:15px;
  border-radius:8px;
  border:none;
}

button{
  margin-top:10px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:white;
  cursor:pointer;
}

.message{
  margin-top:15px;
}
</style>

</head>
<body>

<div class="card">

<h2>Protected Page</h2>

<input type="password" id="passwordInput" placeholder="Enter password">

<button onclick="unlock()">Access</button>

<div class="message" id="message"></div>

</div>

<script>

/////////////////////////////////////////
// CONFIGURATION (ONLY EDIT THESE)
/////////////////////////////////////////

const CONFIG = {

salt: "afdsuh981cmq1297jioafnp90q9i0f",

iv: "DDQGT+RLQ28EMhLu",

ciphertext: "MB3Tn51M5opD7iyQxjanZPeJ0cFaTQtHm5z4HP0W2m+TN0XgMt12N9QHNBsUH+DSJGP+F7zSAfzk+IYfX11Jv0o="

};

/////////////////////////////////////////


async function deriveKey(password){

const enc = new TextEncoder();

const keyMaterial = await crypto.subtle.importKey(
"raw",
enc.encode(password),
"PBKDF2",
false,
["deriveKey"]
);

return crypto.subtle.deriveKey(
{
name:"PBKDF2",
salt:enc.encode(CONFIG.salt),
iterations:150000,
hash:"SHA-256"
},
keyMaterial,
{ name:"AES-GCM", length:256 },
false,
["decrypt"]
);

}


function base64ToBytes(base64){

const bin = atob(base64);
const bytes = new Uint8Array(bin.length);

for(let i=0;i<bin.length;i++){
bytes[i] = bin.charCodeAt(i);
}

return bytes;

}


async function unlock(){

const password = document.getElementById("passwordInput").value;
const message = document.getElementById("message");

try{

const key = await deriveKey(password);

const decrypted = await crypto.subtle.decrypt(
{
name:"AES-GCM",
iv: base64ToBytes(CONFIG.iv)
},
key,
base64ToBytes(CONFIG.ciphertext)
);

const url = new TextDecoder().decode(decrypted);

message.textContent="Access granted...";
setTimeout(()=>window.location=url,1000);

}catch{

message.textContent="Incorrect password";

}

}


document.getElementById("passwordInput")
.addEventListener("keypress",e=>{
if(e.key==="Enter") unlock();
});

</script>

</body>
</html>
