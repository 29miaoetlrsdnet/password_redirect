<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Protected Access</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background:linear-gradient(135deg,#4a6cf7,#6c8cff);
}

.container{
    background:white;
    padding:40px;
    width:320px;
    border-radius:14px;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    margin-bottom:10px;
    font-size:22px;
}

p{
    color:#666;
    font-size:14px;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ddd;
    font-size:15px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#4a6cf7;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#3955d6;
}

.error{
    color:red;
    font-size:13px;
    margin-top:10px;
    display:none;
}
</style>
</head>

<body>

<div class="container">
    <h1>Protected Page</h1>
    <p>Please enter the password to continue</p>

    <input type="password" id="password" placeholder="Enter password">
    <button onclick="checkPassword()">Continue</button>

    <div class="error" id="error">Incorrect password</div>
</div>

<script>

const correctPassword = "andrew_scott_mansfield_stanish@f6"; 
const redirectURL = "https://29miaoet.github.io/Andrew_WebPage/"; 

function checkPassword(){
    const input = document.getElementById("password").value;

    if(input === correctPassword){
        window.location.href = redirectURL;
    }else{
        document.getElementById("error").style.display = "block";
    }
}

document.getElementById("password")
.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        checkPassword();
    }
});

</script>

</body>
</html>
